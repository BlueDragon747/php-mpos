# /etc/logrotate.d/mpos — install with:
#   sudo cp ops/logrotate-mpos.conf /etc/logrotate.d/mpos
#   sudo chmod 644 /etc/logrotate.d/mpos
# MPOS writes per-cron daily logs to /var/www/mpos/cronjobs/logs/<cron>/log_YYYY-MM-DD.txt.
# Apache vhost logs are under the standard apache dir.
# Eloipool uses its own TimedRotatingFileHandler (see LogFile{} in config.py)
# so we only sweep the really-old eloipool logs here.

/var/www/mpos/cronjobs/logs/*/*.txt {
    daily
    rotate 30
    missingok
    notifempty
    compress
    delaycompress
    create 0644 www-data www-data
    sharedscripts
    postrotate
        # MPOS's KLogger doesn't hold open file handles, so no SIGHUP needed.
        true
    endscript
}

/var/www/mpos/logs/*.txt {
    daily
    rotate 30
    missingok
    notifempty
    compress
    delaycompress
    create 0644 www-data www-data
}

/var/log/blakecoin-pool/*.log {
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}

# Blakecoin daemon debug.log — each daemon writes its own.
/home/*/.blakecoin*/regtest/debug.log
/home/*/.blakecoin*/testnet*/debug.log
/home/*/.blakecoin*/debug.log
/home/*/.blakebitcoin*/debug.log
/home/*/.photon*/debug.log
/home/*/.electron*/debug.log
/home/*/.lithium*/debug.log
/home/*/.universalmolecule*/debug.log {
    weekly
    rotate 4
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
}
