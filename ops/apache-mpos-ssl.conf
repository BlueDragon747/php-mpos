# /etc/apache2/sites-available/mpos-ssl.conf
# Production HTTPS vhost for Blakestream-MPOS.
#
# Install:
#   sudo a2enmod ssl headers rewrite
#   sudo cp ops/apache-mpos-ssl.conf /etc/apache2/sites-available/
#   sudo a2dissite 000-default.conf mpos.conf
#   sudo a2ensite mpos-ssl.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Prereqs:
#   1. A Let's Encrypt (or other) cert:
#        sudo apt install certbot python3-certbot-apache
#        sudo certbot --apache -d pool.example.com
#   2. DNS pointing at this box.
#   3. Ports 80 and 443 open on the firewall, stratum (3334) too.

<VirtualHost *:80>
    ServerName pool.example.com
    ServerAlias www.pool.example.com

    # Redirect everything to HTTPS.
    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=301,L]

    # Except .well-known (certbot HTTP-01 renewals).
    <Directory /var/www/mpos/public/.well-known>
        Require all granted
    </Directory>
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName pool.example.com
    ServerAlias www.pool.example.com

    DocumentRoot /var/www/mpos/public

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/pool.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/pool.example.com/privkey.pem

    # Modern TLS profile (Mozilla "intermediate", trimmed).
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    <Directory /var/www/mpos/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Lock down the admin pages to a known-good set of IPs. Uncomment and
    # replace with your office / VPN / home-office CIDRs. MPOS's login
    # already requires admin flag, but defence-in-depth is cheap here.
    # <Location "/?page=admin">
    #     Require ip 10.0.0.0/8 192.168.0.0/16 203.0.113.42
    # </Location>

    # Rate-limit login + signup POSTs (requires mod_qos or mod_evasive,
    # apt: libapache2-mod-evasive). Conservative defaults follow.
    # <IfModule mod_evasive20.c>
    #     DOSHashTableSize   3097
    #     DOSPageCount       10
    #     DOSPageInterval    2
    #     DOSSiteCount       60
    #     DOSSiteInterval    2
    #     DOSBlockingPeriod  600
    # </IfModule>

    ErrorLog  ${APACHE_LOG_DIR}/mpos-error.log
    CustomLog ${APACHE_LOG_DIR}/mpos-access.log combined
</VirtualHost>
</IfModule>
